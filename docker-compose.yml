services:
  backend:
    build:
      context: ./Obsidian_premium/backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "4001:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SQLITE_PATH=/app/data/data.sqlite
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - BOT_API_KEY=${BOT_API_KEY}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./Obsidian_premium/frontend
      dockerfile: Dockerfile
    ports:
      - "8813:80"
    depends_on:
      - backend
    restart: unless-stopped

  bot:
    build:
      context: ./bot - secretaria da minha vida
      dockerfile: Dockerfile
    env_file:
      - "./bot - secretaria da minha vida/.env"
    volumes:
      - "./bot - secretaria da minha vida/.env:/app/.env:ro"
      - "./bot - secretaria da minha vida/assistant:/app/assistant:ro"
    environment:
      - OBSIDIAN_API_BASE_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
