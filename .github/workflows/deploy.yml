# Deploy automático na VPS via SSH (push em main/master).
# Secrets obrigatórios no repositório: VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH.
# Opcional: VPS_PORT (padrão 22).
name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"

            # ── Nome fixo do projeto (evita containers duplicados com nomes diferentes) ──
            export COMPOSE_PROJECT_NAME=gest-o-de-ideias
            git pull

            # ── Garantir .env do bot ────────────────────────────────────────
            BOT_ENV="bot - secretaria da minha vida/.env"
            BOT_EXAMPLE="bot - secretaria da minha vida/.env.example"

            # Se .env nao existe, tenta criar a partir do .env.example
            if [ ! -f "$BOT_ENV" ]; then
              if [ -f "$BOT_EXAMPLE" ]; then
                cp "$BOT_EXAMPLE" "$BOT_ENV"
                echo "AVISO: .env nao encontrado. Criado a partir de .env.example."
                echo "       Preencha os tokens em: $BOT_ENV"
              else
                echo "ERRO: Nem .env nem .env.example encontrados em: $BOT_ENV" >&2
                exit 1
              fi
            else
              echo ".env do bot encontrado. Usando existente."
            fi

            # Verificar se tokens obrigatorios estao preenchidos
            check_var() {
              VAL=$(grep -E "^${1}=" "$BOT_ENV" | cut -d= -f2- | tr -d '[:space:]')
              if [ -z "$VAL" ]; then
                echo "================================================================" >&2
                echo "  ERRO: $1 esta vazio no $BOT_ENV"                             >&2
                echo "  Preencha o token real no servidor e faca o deploy novamente." >&2
                echo "================================================================" >&2
                exit 1
              fi
              PREVIEW=$(echo "$VAL" | cut -c1-8)
              echo "  $1 = ${PREVIEW}... (OK)"
            }
            echo ">>> Verificando tokens no .env do bot..."
            check_var TELEGRAM_BOT_TOKEN
            check_var OPENROUTER_API_KEY
            echo ".env do bot OK - todos os tokens presentes."

            # ── Remover container e imagem antiga do bot (build limpo) ───────
            echo ">>> Removendo container e imagem do bot (build limpo a cada deploy)..."
            docker rm -f gest-o-de-ideias-bot-1 2>/dev/null || true
            docker rmi -f gest-o-de-ideias-bot  2>/dev/null || true

            # ── Parar todos os containers do compose ─────────────────────────
            echo ">>> Parando containers do compose..."
            docker compose --project-name gest-o-de-ideias down --remove-orphans || true

            # ── Limpar containers com nomes antigos/divergentes ─────────────
            docker ps -a --format '{{.Names}}' \
              | grep -E '^(gestao-ideias|gest-o-de-ideias)-' \
              | xargs -r docker rm -f 2>/dev/null || true

            # ── Forcar liberacao das portas 4001 e 8813 ──────────────────────
            echo ">>> Verificando portas 4001 e 8813..."
            for PORT in 4001 8813; do
              CONTAINERS=$(docker ps --format '{{.ID}} {{.Ports}}' \
                | grep ":${PORT}->" | awk '{print $1}')
              if [ -n "$CONTAINERS" ]; then
                echo "    Porta $PORT ocupada por: $CONTAINERS - removendo..."
                echo "$CONTAINERS" | xargs docker rm -f 2>/dev/null || true
              else
                echo "    Porta $PORT livre."
              fi
            done

            # ── Aguardar liberacao efetiva das portas ──────────────────────
            echo ">>> Aguardando portas liberarem..."
            for PORT in 4001 8813; do
              TIMEOUT=15
              ELAPSED=0
              while ss -tlnp "sport = :${PORT}" 2>/dev/null | grep -q ":${PORT}"; do
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERRO: Porta $PORT ainda ocupada apos ${TIMEOUT}s. Abortando." >&2
                  exit 1
                fi
                sleep 1
                ELAPSED=$((ELAPSED + 1))
              done
              echo "    Porta $PORT confirmada como livre."
            done

            # ── Build: bot sem cache, demais com cache ───────────────────────
            echo ">>> Buildando backend e frontend (com cache)..."
            docker compose --project-name gest-o-de-ideias build --pull backend frontend

            echo ">>> Buildando bot do ZERO (sem cache)..."
            docker compose --project-name gest-o-de-ideias build --no-cache --pull bot

            # ── Subir todos os containers ────────────────────────────────────
            echo ">>> Subindo containers..."
            docker compose --project-name gest-o-de-ideias up -d --remove-orphans

            echo ">>> Deploy concluido com sucesso!"
            docker compose --project-name gest-o-de-ideias ps
