# Deploy automático na VPS via SSH (push em main/master).
# Secrets obrigatórios: VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH,
#                        BOT_TELEGRAM_TOKEN, BOT_OPENROUTER_KEY.
# Secrets opcionais: VPS_PORT (padrão 22), BOT_NOTION_TOKEN, BOT_ALLOWED_USERS.
name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      BOT_TELEGRAM_TOKEN: ${{ secrets.BOT_TELEGRAM_TOKEN }}
      BOT_OPENROUTER_KEY: ${{ secrets.BOT_OPENROUTER_KEY }}
      BOT_NOTION_TOKEN: ${{ secrets.BOT_NOTION_TOKEN }}
      BOT_ALLOWED_USERS: ${{ secrets.BOT_ALLOWED_USERS }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_PATH,BOT_TELEGRAM_TOKEN,BOT_OPENROUTER_KEY,BOT_NOTION_TOKEN,BOT_ALLOWED_USERS
          script: |
            set -e
            cd "$DEPLOY_PATH"

            # ── Nome fixo do projeto (evita containers duplicados com nomes diferentes) ──
            export COMPOSE_PROJECT_NAME=gest-o-de-ideias
            git pull

            # ── Escrever .env do bot a partir dos GitHub Secrets ────────────
            BOT_ENV="bot - secretaria da minha vida/.env"

            # Validar secrets obrigatorios antes de qualquer coisa
            if [ -z "$BOT_TELEGRAM_TOKEN" ]; then
              echo "ERRO: Secret BOT_TELEGRAM_TOKEN nao configurado no GitHub." >&2
              echo "      Va em Settings > Secrets > Actions e adicione o secret." >&2
              exit 1
            fi
            if [ -z "$BOT_OPENROUTER_KEY" ]; then
              echo "ERRO: Secret BOT_OPENROUTER_KEY nao configurado no GitHub." >&2
              echo "      Va em Settings > Secrets > Actions e adicione o secret." >&2
              exit 1
            fi

            echo ">>> Escrevendo .env do bot a partir dos GitHub Secrets..."
            printf 'TELEGRAM_BOT_TOKEN=%s\n' "$BOT_TELEGRAM_TOKEN"   > "$BOT_ENV"
            printf 'OPENROUTER_API_KEY=%s\n' "$BOT_OPENROUTER_KEY"  >> "$BOT_ENV"
            printf 'NOTION_TOKEN=%s\n'        "$BOT_NOTION_TOKEN"    >> "$BOT_ENV"
            printf 'OBSIDIAN_API_BASE_URL=http://backend:4000\n'     >> "$BOT_ENV"
            printf 'APP_BASE_URL=http://%s:8813\n' "$(hostname -I | awk '{print $1}')" >> "$BOT_ENV"
            printf 'OPENROUTER_MODEL=meta-llama/llama-3-8b-instruct\n' >> "$BOT_ENV"
            printf 'ALLOWED_TELEGRAM_USERS=%s\n' "$BOT_ALLOWED_USERS" >> "$BOT_ENV"

            echo "  TELEGRAM_BOT_TOKEN = $(echo "$BOT_TELEGRAM_TOKEN" | cut -c1-8)... (OK)"
            echo "  OPENROUTER_API_KEY = $(echo "$BOT_OPENROUTER_KEY" | cut -c1-8)... (OK)"
            [ -n "$BOT_NOTION_TOKEN" ] && echo "  NOTION_TOKEN = $(echo "$BOT_NOTION_TOKEN" | cut -c1-8)... (OK)" || echo "  NOTION_TOKEN = (nao configurado)"
            echo ".env do bot escrito com sucesso."

            # ── Remover container e imagem antiga do bot (build limpo) ───────
            echo ">>> Removendo container e imagem do bot (build limpo a cada deploy)..."
            docker rm -f gest-o-de-ideias-bot-1 2>/dev/null || true
            docker rmi -f gest-o-de-ideias-bot  2>/dev/null || true

            # ── Parar todos os containers do compose ─────────────────────────
            echo ">>> Parando containers do compose..."
            docker compose --project-name gest-o-de-ideias down --remove-orphans || true

            # ── Limpar containers com nomes antigos/divergentes ─────────────
            docker ps -a --format '{{.Names}}' \
              | grep -E '^(gestao-ideias|gest-o-de-ideias)-' \
              | xargs -r docker rm -f 2>/dev/null || true

            # ── Forcar liberacao das portas 4001 e 8813 ──────────────────────
            echo ">>> Verificando portas 4001 e 8813..."
            for PORT in 4001 8813; do
              CONTAINERS=$(docker ps --format '{{.ID}} {{.Ports}}' \
                | grep ":${PORT}->" | awk '{print $1}')
              if [ -n "$CONTAINERS" ]; then
                echo "    Porta $PORT ocupada por: $CONTAINERS - removendo..."
                echo "$CONTAINERS" | xargs docker rm -f 2>/dev/null || true
              else
                echo "    Porta $PORT livre."
              fi
            done

            # ── Aguardar liberacao efetiva das portas ──────────────────────
            echo ">>> Aguardando portas liberarem..."
            for PORT in 4001 8813; do
              TIMEOUT=15
              ELAPSED=0
              while ss -tlnp "sport = :${PORT}" 2>/dev/null | grep -q ":${PORT}"; do
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERRO: Porta $PORT ainda ocupada apos ${TIMEOUT}s. Abortando." >&2
                  exit 1
                fi
                sleep 1
                ELAPSED=$((ELAPSED + 1))
              done
              echo "    Porta $PORT confirmada como livre."
            done

            # ── Build: bot sem cache, demais com cache ───────────────────────
            echo ">>> Buildando backend e frontend (com cache)..."
            docker compose --project-name gest-o-de-ideias build --pull backend frontend

            echo ">>> Buildando bot do ZERO (sem cache)..."
            docker compose --project-name gest-o-de-ideias build --no-cache --pull bot

            # ── Subir todos os containers ────────────────────────────────────
            echo ">>> Subindo containers..."
            docker compose --project-name gest-o-de-ideias up -d --remove-orphans

            echo ">>> Deploy concluido com sucesso!"
            docker compose --project-name gest-o-de-ideias ps
