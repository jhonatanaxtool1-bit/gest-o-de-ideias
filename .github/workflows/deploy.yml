# Deploy automático na VPS via SSH (push em main/master).
# Secrets obrigatórios no repositório: VPS_HOST, VPS_USER, VPS_SSH_KEY, DEPLOY_PATH.
# Opcional: VPS_PORT (padrão 22).
name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"

            # ── Nome fixo do projeto (evita containers duplicados com nomes diferentes) ──
            export COMPOSE_PROJECT_NAME=gest-o-de-ideias
            git pull

            # ── Garantir .env do bot ────────────────────────────────────────
            BOT_ENV="bot - secretaria da minha vida/.env"
            BOT_EXAMPLE="bot - secretaria da minha vida/.env.example"
            if [ ! -f "$BOT_ENV" ] && [ -f "$BOT_EXAMPLE" ]; then
              cp "$BOT_EXAMPLE" "$BOT_ENV"
              echo "AVISO: Criado $BOT_ENV a partir de .env.example. Configure os tokens no servidor."
            fi

            # ── Limpar containers com nomes antigos/divergentes ─────────────
            # Isso evita o problema de rodar compose de uma subpasta e criar
            # containers com nome diferente (ex: gestao-ideias-* vs gest-o-de-ideias-*)
            echo ">>> Removendo containers com padrões de nome antigos..."
            docker ps -a --format '{{.Names}}' \
              | grep -E '^(gestao-ideias|gest-o-de-ideias)-' \
              | xargs -r docker rm -f 2>/dev/null || true

            # ── Parar containers do compose (libera portas gerenciadas) ─────
            echo ">>> Parando containers do compose..."
            docker compose --project-name gest-o-de-ideias down --remove-orphans || true

            # ── Forçar liberação das portas 4001 e 8813 ─────────────────────
            # Mata QUALQUER container (inclusive externos ao compose) que esteja
            # usando essas portas – evita o erro "port is already allocated".
            echo ">>> Verificando portas 4001 e 8813..."
            for PORT in 4001 8813; do
              CONTAINERS=$(docker ps --format '{{.ID}} {{.Ports}}' \
                | grep ":${PORT}->" | awk '{print $1}')
              if [ -n "$CONTAINERS" ]; then
                echo "    Porta $PORT ocupada por: $CONTAINERS — removendo..."
                echo "$CONTAINERS" | xargs docker rm -f 2>/dev/null || true
              else
                echo "    Porta $PORT livre."
              fi
            done

            # ── Aguardar liberação efetiva das portas ───────────────────────
            echo ">>> Aguardando portas liberarem..."
            for PORT in 4001 8813; do
              TIMEOUT=15
              ELAPSED=0
              while ss -tlnp "sport = :${PORT}" 2>/dev/null | grep -q ":${PORT}"; do
                if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
                  echo "ERRO: Porta $PORT ainda ocupada após ${TIMEOUT}s. Abortando." >&2
                  exit 1
                fi
                sleep 1
                ELAPSED=$((ELAPSED + 1))
              done
              echo "    Porta $PORT confirmada como livre."
            done

            # ── Build e subida ───────────────────────────────────────────────
            echo ">>> Buildando imagens..."
            docker compose --project-name gest-o-de-ideias build --pull

            echo ">>> Subindo containers..."
            docker compose --project-name gest-o-de-ideias up -d --remove-orphans

            echo ">>> Deploy concluído com sucesso!"
            docker compose --project-name gest-o-de-ideias ps
